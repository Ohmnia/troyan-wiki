<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Troyan-3500 Wiki</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  </head>
  <body>
    <div class="flex h-screen">
      <!-- Sidebar Navigation -->
      <aside id="sidebar" class="bg-blue-900 border-r border-blue-200 px-4 py-6 overflow-y-auto flex-shrink-0 min-w-[260px]">
        <div class="flex items-center mb-6">
          <span class="text-xl font-bold text-cyan-400">Troyan-3500</span>
        </div>
        <nav class="space-y-2">
          <a href="#home" class="flex items-center px-2 py-2 rounded-md hover:bg-cyan-700 transition-colors cursor-pointer">
            <span class="material-icons md-20 text-white">home</span>
            <span class="ml-3 text-white font-medium group-hover:text-cyan-300">Home</span>
          </a>
          <!-- Link Tree Structure -->
          <div class="mt-4 space-y-1">
            <div class="flex items-center px-2 py-2 rounded-md bg-blue-800">
              <span class="material-icons md-20 text-cyan-300">description</span>
              <span class="ml-3 text-cyan-100 font-medium">Documentation</span>
            </div>
            <!-- Nested Links -->
            <div class="ml-4 space-y-1">
              <a href="/pages/getting-started.md" class="flex items-center px-2 py-1 rounded-md text-sm hover:bg-cyan-700 transition-colors cursor-pointer">
                <span class="material-icons md-18 text-white">play_circle_filled</span>
                <span class="ml-2 text-white group-hover:text-cyan-300">Getting Started</span>
              </a>
              <a href="/pages/game-mechanics.md" class="flex items-center px-2 py-1 rounded-md text-sm hover:bg-cyan-700 transition-colors cursor-pointer">
                <span class="material-icons md-18 text-white">settings</span>
                <span class="ml-2 text-white group-hover:text-cyan-300">Game Mechanics</span>
              </a>
              <a href="#technical-specs" class="flex items-center px-2 py-1 rounded-md text-sm hover:bg-cyan-700 transition-colors cursor-pointer">
                <span class="material-icons md-18 text-white">precision_manufacturing</span>
                <span class="ml-2 text-white group-hover:text-cyan-300">Technical Specs</span>
              </a>
            </div>
          </div>
          <div class="mt-6 space-y-1">
            <div class="flex items-center px-2 py-2 rounded-md hover:bg-blue-800 transition-colors cursor-default">
              <span class="material-icons md-20 text-cyan-300">folder</span>
              <span class="ml-3 text-cyan-100 font-medium">Assets</span>
            </div>
            <div class="ml-4 space-y-1">
              <a href="#characters" class="flex items-center px-2 py-1 rounded-md text-sm hover:bg-cyan-700 transition-colors cursor-pointer">
                <span class="material-icons md-18 text-white">person</span>
                <span class="ml-2 text-white group-hover:text-cyan-300">Characters</span>
              </a>
              <a href="#locations" class="flex items-center px-2 py-1 rounded-md text-sm hover:bg-cyan-700 transition-colors cursor-pointer">
                <span class="material-icons md-18 text-white">place</span>
                <span class="ml-2 text-white group-hover:text-cyan-300">Locations</span>
              </a>
            </div>
          </div>
        </nav>
      </aside>
      
      <!-- Main Content Area -->
      <main id="main-content" class="flex-1 overflow-hidden flex flex-col bg-gray-50">
        <!-- Content -->
        <section id="content" class="flex-1 p-6 overflow-y-auto">
          <!-- Wiki content will be loaded here -->
          <div class="prose prose-cyan max-w-none">
            <h1 class="text-gray-500">Welcome</h1>
            <p class="text-blue-500">Select a page from the navigation to view content.</p>
          </div>
        </section>
      </main>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
